services:
  - type: web
    name: biskora-cookies
    env: node
    plan: starter
    buildCommand: rm -rf node_modules && pnpm install && pnpm build
    startCommand: pnpm drizzle-kit push --force && pnpm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: biskora-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: biskora-db
    plan: starter
